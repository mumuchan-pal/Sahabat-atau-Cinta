<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pixel Lyrics Visualizer - Pemandangan Alam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

  :root{
    --gold:#ffd36e;
    --peach:#ff9a6c;
    --dusk:#7b2ff7;
    --cream:#fff2c9;
    --panel:#2b1a3d;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:#1a0f2e;
    overflow:hidden;
    font-family:'VT323',monospace;
  }

  /* ===== Pixel nature scene (always running behind everything) ===== */
  #bg-canvas{
    position:fixed;inset:0;
    width:100%;height:100%;
    z-index:0;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
  }
  .scanlines{
    position:fixed;inset:0;z-index:2;pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 2px, transparent 4px);
    mix-blend-mode:overlay;
  }
  .vignette{
    position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 45%, rgba(10,5,20,0.55) 100%);
  }

  .title{
    font-family:'Press Start 2P',monospace;
    font-size:13px;
    color:var(--gold);
    text-shadow:2px 2px 0 var(--dusk), 0 0 10px rgba(255,211,110,.6);
    letter-spacing:2px;
    text-align:center;
  }

  /* ===== WELCOME SCREEN ===== */
  #welcomeScreen{
    position:fixed;inset:0;z-index:10;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;padding:24px;
    background:rgba(12,6,24,0.55);
    backdrop-filter:blur(2px);
    transition:opacity .6s ease, transform .6s ease;
  }
  #welcomeScreen.hide{
    opacity:0;
    transform:scale(1.08) translateY(-24px);
    pointer-events:none;
  }

  .welcome-heading{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(18px,5vw,30px);
    color:var(--cream);
    text-shadow:3px 3px 0 var(--dusk), 0 0 16px rgba(255,154,108,.7);
    text-align:center;
    letter-spacing:2px;
  }
  .welcome-sub{
    font-size:17px;color:var(--peach);opacity:.9;text-align:center;
    text-shadow:1px 1px 2px rgba(0,0,0,.6);
    max-width:520px;
  }

  .play-btn{
    font-family:'Press Start 2P',monospace;
    font-size:14px;
    padding:14px 26px;
    background:var(--panel);
    color:var(--gold);
    border:4px solid var(--gold);
    cursor:pointer;
    box-shadow:4px 4px 0 var(--peach);
    transition:transform .1s;
  }
  .play-btn:hover{background:var(--gold);color:var(--panel);}
  .play-btn:active{transform:translate(4px,4px);box-shadow:none;}

  /* ===== MAIN LYRICS STAGE ===== */
  #mainStage{
    position:relative;z-index:3;
    height:100%;
    display:flex;flex-direction:column;
    align-items:center;justify-content:space-between;
    padding:26px 18px;
    color:#fff;
    opacity:0;
    transition:opacity .9s ease .15s;
  }
  #mainStage.show{opacity:1;}

  .subtitle{
    font-size:14px;color:var(--cream);opacity:.6;margin-top:6px;text-align:center;
  }

  .stage-scrim{
    width:100%;max-width:760px;
    padding:20px 22px;border-radius:6px;
    background:linear-gradient(180deg, rgba(20,10,35,0.15), rgba(20,10,35,0.45));
    backdrop-filter:blur(1px);
  }
  .stage{
    width:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;text-align:center;
  }
  .line{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(11px,3.6vw,19px);
    line-height:1.9;
    color:var(--cream);
    letter-spacing:1px;
    opacity:0;
    text-shadow:0 0 6px var(--peach), 0 0 14px var(--gold), 2px 2px 0 var(--dusk);
    transition: opacity .8s cubic-bezier(.33,.0,.2,1);
    will-change:opacity;
  }
  /* muncul: memudar masuk secara halus */
  .line.shown.active{
    opacity:1;
  }
  /* hilang: memudar keluar, sedikit lebih cepat dari saat muncul */
  .line.leaving{
    opacity:0;
    transition: opacity .55s cubic-bezier(.4,0,.6,1);
  }
  /* reset opacity tanpa transisi sebelum baris baru mulai memudar masuk */
  .line.entering{
    transition:none !important;
    opacity:0;
  }

  .bottom-controls{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;
  }
  button.mini{
    font-family:'Press Start 2P',monospace;
    font-size:10px;padding:9px 12px;
    background:var(--panel);color:var(--gold);
    border:3px solid var(--gold);cursor:pointer;
    box-shadow:3px 3px 0 var(--peach);
  }
  button.mini:hover{background:var(--gold);color:var(--panel);}
  button.mini:active{transform:translate(3px,3px);box-shadow:none;}

  .progress-track{
    width:min(70vw,420px);height:6px;background:rgba(255,255,255,0.15);
    border:2px solid var(--dusk);
  }
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--peach),var(--gold));}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>

<!-- ===== WELCOME SCREEN ===== -->
<div id="welcomeScreen">
  <div class="title">♫ PIXEL LYRICS ♫</div>
  <div class="welcome-heading">WELCOME!!>3</div>
  <div class="welcome-sub">By: K.</div>

  <button class="play-btn" id="startBtn">▶ MULAI</button>
</div>

<!-- ===== MAIN LYRICS STAGE ===== -->
<div id="mainStage">
  <div>
    <div class="title">♫ SAHABAT ATAU CINTA ♫</div>
    <div class="subtitle">JKT48 &mdash; Marsha, Christy</div>
  </div>

  <div class="stage-scrim">
    <div class="stage" id="stage"></div>
  </div>

  <div class="bottom-controls">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <button class="mini" id="replayBtn">⟲ ULANGI</button>
    <button class="mini" id="backBtn">← KEMBALI</button>
  </div>
</div>

<script>
// ================= Pixel nature scene =================
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
const GRID_W = 96, GRID_H = 54;
canvas.width = GRID_W;
canvas.height = GRID_H;
ctx.imageSmoothingEnabled = false;

const horizonY = GRID_H * 0.60;
const grassY = GRID_H * 0.80;

function farMountainH(x){ return horizonY - (Math.sin(x*0.15)*2.6 + Math.sin(x*0.05+1)*3.4 + 6); }
function nearMountainH(x){ return horizonY - (Math.sin(x*0.25+2)*1.8 + Math.sin(x*0.08+0.5)*2.6 + 2.5) + 3; }

const grassDots = [];
(function seedGrass(){
  let s = 42;
  function rnd(){ s = (s*9301+49297)%233280; return s/233280; }
  for(let i=0;i<70;i++){
    grassDots.push({ x: rnd()*GRID_W, y: grassY + rnd()*(GRID_H-grassY), light: rnd() > 0.5 });
  }
})();

function drawSky(){
  const grad = ctx.createLinearGradient(0,0,0,horizonY);
  grad.addColorStop(0,   '#2b1055');
  grad.addColorStop(0.30,'#5a2a9c');
  grad.addColorStop(0.55,'#c9578f');
  grad.addColorStop(0.75,'#ff9a6c');
  grad.addColorStop(1,   '#ffd36e');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,GRID_W,horizonY);
}

function drawSun(t){
  const cx = GRID_W*0.72, cy = horizonY*0.72;
  const pulse = 1 + Math.sin(t*0.6)*0.06;
  const r = 6.5*pulse;
  for(let i=4;i>=1;i--){
    ctx.globalAlpha = 0.05*i;
    ctx.fillStyle = '#fff2c9';
    ctx.beginPath(); ctx.arc(cx,cy,r + i*3,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#fff2c9';
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
}

function drawCloud(x,y,scale,alpha){
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ffe8d6';
  const blocks = [[0,0,4,2],[1,-1,3,2],[3,-1,3,2],[-1,1,7,2]];
  blocks.forEach(b=>{ ctx.fillRect(x+b[0]*scale, y+b[1]*scale, b[2]*scale, b[3]*scale); });
  ctx.globalAlpha = 1;
}

function drawClouds(t){
  const speed = 1.1;
  const defs = [
    {baseX:-10, y:8, scale:1.1, alpha:0.55, off:0},
    {baseX:30,  y:5, scale:0.8, alpha:0.4,  off:12},
    {baseX:60,  y:11,scale:1.3, alpha:0.5,  off:25}
  ];
  defs.forEach(c=>{
    let x = (c.baseX + t*speed + c.off) % (GRID_W+20) - 10;
    drawCloud(x, c.y, c.scale, c.alpha);
  });
}

function drawBirds(t){
  ctx.strokeStyle = '#3a2350';
  ctx.lineWidth = 0.5;
  const birds = [ {x:20,y:14,ph:0}, {x:26,y:12,ph:1}, {x:15,y:17,ph:2} ];
  birds.forEach(b=>{
    const bob = Math.sin(t*2+b.ph)*0.4;
    ctx.beginPath();
    ctx.moveTo(b.x-1.2, b.y+bob);
    ctx.lineTo(b.x, b.y-0.6+bob);
    ctx.lineTo(b.x+1.2, b.y+bob);
    ctx.stroke();
  });
}

function drawMountains(){
  ctx.fillStyle = '#4b3869';
  ctx.beginPath(); ctx.moveTo(0, grassY);
  for(let x=0;x<=GRID_W;x++){ ctx.lineTo(x, farMountainH(x)); }
  ctx.lineTo(GRID_W, grassY); ctx.closePath(); ctx.fill();

  ctx.fillStyle = '#33234a';
  ctx.beginPath(); ctx.moveTo(0, grassY);
  for(let x=0;x<=GRID_W;x++){ ctx.lineTo(x, nearMountainH(x)); }
  ctx.lineTo(GRID_W, grassY); ctx.closePath(); ctx.fill();
}

function drawGrass(){
  const grad = ctx.createLinearGradient(0,grassY,0,GRID_H);
  grad.addColorStop(0,'#2f6b4f'); grad.addColorStop(1,'#1c4433');
  ctx.fillStyle = grad; ctx.fillRect(0,grassY,GRID_W,GRID_H-grassY);
  grassDots.forEach(d=>{
    ctx.fillStyle = d.light ? '#5ea174' : '#173a2c';
    ctx.fillRect(d.x, d.y, 0.8, 0.8);
  });
}

function drawTree(){
  const bx = 9, topY = grassY - 15;
  ctx.fillStyle = '#3d2a22';
  ctx.fillRect(bx-1, topY+8, 2, 10);
  ctx.fillStyle = '#2f6b3f';
  ctx.beginPath(); ctx.arc(bx, topY+5, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3a8451';
  ctx.beginPath(); ctx.arc(bx-3, topY+7, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+4, topY+7, 4, 0, Math.PI*2); ctx.fill();
}

function drawChild(t){
  const bx = GRID_W*0.5 + 2, by = grassY;
  const sway = Math.sin(t*0.8)*0.15;

  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#10091c';
  ctx.beginPath(); ctx.ellipse(bx, by+0.6, 4.2, 1.1, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#241a33';
  ctx.beginPath(); ctx.ellipse(bx+sway, by-3.2, 3.1, 3.3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+0.6+sway, by-7.3, 1.9, 0, Math.PI*2); ctx.fill();

  ctx.beginPath();
  ctx.moveTo(bx-0.7+sway, by-8.9);
  ctx.lineTo(bx+1.6+sway, by-9.4);
  ctx.lineTo(bx+0.2+sway, by-7.6);
  ctx.closePath(); ctx.fill();

  ctx.strokeStyle = 'rgba(255,211,110,0.5)';
  ctx.lineWidth = 0.35;
  ctx.beginPath(); ctx.ellipse(bx+sway, by-3.2, 3.1, 3.3, 0, -0.6, 1.1); ctx.stroke();
}

function drawFireflies(t){
  const flies = [ {x:16,y:grassY-4,ph:0}, {x:22,y:grassY-7,ph:1.4}, {x:70,y:grassY-5,ph:2.6}, {x:78,y:grassY-8,ph:0.7} ];
  flies.forEach(f=>{
    const twinkle = 0.3 + 0.7*Math.abs(Math.sin(t*2+f.ph));
    const y = f.y + Math.sin(t+f.ph)*0.8;
    ctx.globalAlpha = twinkle;
    ctx.fillStyle = '#ffe98a';
    ctx.fillRect(f.x, y, 0.7, 0.7);
    ctx.globalAlpha = 1;
  });
}

function render(t){
  drawSky(); drawSun(t); drawClouds(t); drawBirds(t);
  drawMountains(); drawGrass(); drawTree(); drawChild(t); drawFireflies(t);
}
function loop(ts){ render(ts/1000); requestAnimationFrame(loop); }
requestAnimationFrame(loop);

// ================= Welcome / setup logic =================
const welcomeScreen = document.getElementById('welcomeScreen');
const mainStage = document.getElementById('mainStage');
const startBtn = document.getElementById('startBtn');
const replayBtn = document.getElementById('replayBtn');
const backBtn = document.getElementById('backBtn');
const stage = document.getElementById('stage');
const progressFill = document.getElementById('progressFill');

const DEFAULT_LYRICS = ` [00:00]Harus pilih sahabat atau cinta:(
[00:11]Kau belahan jantungku berdetak
[00:18]Semua tentang kita seirama
[00:25]Ohhhhhhhh namun langkah kita tersesat
[00:31]Kau dan ku jatuh ke hati yang sama
[00:38]Sirna semua derai tawa
[00:42]Diam sejuta bahasa
[00:48]Tak bicaraaaaaaa
[00:52]Masihkah ada sebingkai harapan
[00:59]Berbagai senyuman
[01:02]Berjalan bergandeng tangan
[01:06]Pahitnya jurus menerima kenyataan
[01:13]Harus pilih sahabat atau cinta:(`;

// ---- Parse lyrics: supports optional [mm:ss] timestamp; auto-computes
// a per-line delay (reading-speed based) for any line left without one.
// This timing is intentionally never exposed as a numeric control in the UI.
function parseLyrics(raw){
  const rawLines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const parsed = [];
  let cumulative = 0;

  rawLines.forEach(l=>{
    const m = l.match(/^\[(\d{1,2}):(\d{1,2}(?:\.\d+)?)\]\s*(.*)$/);
    if(m){
      const time = parseInt(m[1])*60 + parseFloat(m[2]);
      const text = m[3];
      cumulative = time;
      parsed.push({ time, text });
    } else {
      const words = l.split(/\s+/).length;
      const dur = Math.min(6, Math.max(1.4, 0.9 + words*0.35));
      parsed.push({ time: cumulative, text: l });
      cumulative += dur;
    }
  });
  return parsed.length ? parsed : [{time:0, text:'(tulis lirikmu di kotak setup)'}];
}

let lines = [];
let currentIndex = -1;
let virtualStart = 0;
let virtualTimer = null;

function buildStageDOM(){
  stage.innerHTML = '<div class="line" id="lineEl"></div>';
}

function highlightUpTo(elapsed){
  let target = -1;
  for(let i=0;i<lines.length;i++){
    if(lines[i].time <= elapsed) target = i; else break;
  }
  if(target !== currentIndex){
    currentIndex = target;
    const el = document.getElementById('lineEl');
    if(!el) return;

    // 1) geser + fade KELUAR baris yang sedang tampil
    el.classList.remove('entering');
    el.classList.add('leaving');
    el.classList.remove('shown','active');

    setTimeout(()=>{
      if(currentIndex < 0){
        el.classList.remove('leaving');
        el.textContent = '';
        return;
      }
      // 2) reset posisi ke bawah TANPA transisi (biar tidak kaku/melompat saat masuk)
      el.classList.remove('leaving');
      el.classList.add('entering');
      el.textContent = lines[currentIndex].text;
      void el.offsetWidth; // paksa reflow supaya transition berikutnya benar-benar terpisah

      // 3) lepas 'entering' di frame berikutnya supaya transisi geser MASUK berjalan halus
      requestAnimationFrame(()=>{
        el.classList.remove('entering');
        el.classList.add('shown','active');
      });
    }, 460);
  }
}

function totalDuration(){
  if(!lines.length) return 1;
  const last = lines[lines.length-1];
  return last.time + Math.max(3, last.text.split(/\s+/).length*0.35+1.5);
}

function startVirtualClock(){
  clearInterval(virtualTimer);
  virtualStart = performance.now();
  virtualTimer = setInterval(()=>{
    const elapsed = (performance.now()-virtualStart)/1000;
    highlightUpTo(elapsed);
    progressFill.style.width = Math.min(100,(elapsed/totalDuration())*100)+'%';
  }, 120);
}

function beginPlayback(){
  lines = parseLyrics(DEFAULT_LYRICS);
  buildStageDOM();
  currentIndex = -1;
  progressFill.style.width = '0%';
  startVirtualClock();
}

startBtn.addEventListener('click', ()=>{
  welcomeScreen.classList.add('hide');
  setTimeout(()=>{ welcomeScreen.style.display = 'none'; }, 650);
  mainStage.classList.add('show');
  beginPlayback();
});

replayBtn.addEventListener('click', ()=>{
  clearInterval(virtualTimer);
  beginPlayback();
});

backBtn.addEventListener('click', ()=>{
  clearInterval(virtualTimer);
  mainStage.classList.remove('show');
  welcomeScreen.style.display = 'flex';
  requestAnimationFrame(()=> welcomeScreen.classList.remove('hide'));
});
</script>
</body>
</html>
